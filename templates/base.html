{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

    <!-- =========================
         META
    ========================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            Biblioteca Comunitaria La Gomera
        {% endblock %}
    </title>

    <meta name="description"
          content="Biblioteca Comunitaria La Gomera. Descubre libros, fomenta la lectura y forma parte de nuestra comunidad.">

    <meta name="author" content="Biblioteca Comunitaria La Gomera">

    <meta name="theme-color" content="#1d4ed8">

    <!-- =========================
         FAVICON
    ========================== -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}">

    <!-- =========================
         GOOGLE FONTS
    ========================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap"
          rel="stylesheet">

    <!-- =========================
         CSS
    ========================== -->

    <link rel="preload" href="{% static 'css/style.css' %}" as="style">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}
    {% endblock %}

</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->

    {% include 'partials/header.html' %}

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main>

        {% block content %}
        {% endblock %}

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    {% include 'partials/footer.html' %}

    <!-- =========================
         JAVASCRIPT
    ========================== -->

    <script src="{% static 'js/app.js' %}"></script>

    {% block extra_js %}
    {% endblock %}

</body>

</html>
